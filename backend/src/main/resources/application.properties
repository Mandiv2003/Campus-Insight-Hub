# ============================================================
# Smart Campus Operations Hub — Application Config
# ============================================================

server.port=8080

# ── MongoDB ──────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/smartcampus}

# ── JWT ─────────────────────────────────────────────────────
# Secret must be >= 32 characters for HS256
jwt.secret=${JWT_SECRET:smartcampus-dev-secret-key-at-least-32-chars-ok}
jwt.expiration-ms=86400000

# ── OAuth2 Google ────────────────────────────────────────────
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/oauth2/callback/google

# Frontend redirect after OAuth success
app.oauth2.redirect-uri=http://localhost:5173/oauth-callback

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
app.upload-dir=uploads

# ── Logging ─────────────────────────────────────────────────
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=INFO
