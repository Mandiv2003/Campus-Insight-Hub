# ============================================================
# Smart Campus Operations Hub — Application Config
# Set real values via environment variables or a local .env
# ============================================================

server.port=8080

# ── Database ────────────────────────────────────────────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartcampus}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ─────────────────────────────────────────────────────
# Flyway manages schema; validate ensures JPA entities match the migrated schema
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Flyway ──────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── JWT ─────────────────────────────────────────────────────
# Secret must be >= 32 characters for HS256
jwt.secret=${JWT_SECRET:smartcampus-dev-secret-key-at-least-32-chars-ok}
jwt.expiration-ms=86400000

# ── OAuth2 Google ────────────────────────────────────────────
# Set GOOGLE_CLIENT_ID and GOOGLE_CLIENT_SECRET as env vars
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=http://localhost:8080/oauth2/callback/google

# Frontend redirect after OAuth success
app.oauth2.redirect-uri=http://localhost:5173/oauth-callback

# ── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads
app.upload-dir=uploads

# ── Logging ─────────────────────────────────────────────────
logging.level.com.smartcampus=DEBUG
logging.level.org.springframework.security=INFO
