# Test overrides — used by @SpringBootTest
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartcampus_test}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

jwt.secret=${JWT_SECRET:test-secret-key-minimum-32-characters-ok-x}

spring.security.oauth2.client.registration.google.client-id=dummy
spring.security.oauth2.client.registration.google.client-secret=dummy
