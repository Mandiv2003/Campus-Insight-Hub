name: Frontend CI
# TEMPORARILY DISABLED — re-enable by restoring the on: block below
on:
  workflow_dispatch:
# on:
#   push:
#     branches: [develop, main]
#     paths: ['frontend/**']
#   pull_request:
#     branches: [develop, main]
#     paths: ['frontend/**']

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
